<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            Cinema
        {% endblock %}
    </title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #111827;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }

        nav {
            background-color: #1f2937;
            padding: 20px 0;
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        .logo a {
            color: white;
            text-decoration: none;
        }

        .menu {
            display: flex;
            gap: 20px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            transition: .3s;
        }

        .menu a:hover {
            color: #60a5fa;
        }

        main {
            min-height: 80vh;
            padding: 40px 0;
        }

        footer {
            background-color: #1f2937;
            text-align: center;
            padding: 20px;
        }
    </style>

    {% block css %}
    {% endblock %}
</head>
<body>

<nav>
    <div class="container">
        <div class="logo">
            <a href="/">Cinema</a>
        </div>

        <div class="menu">
            <a href="/movies/">Фильмы</a>
            <a href="#">Сеансы</a>
            <a href="#">Бронирования</a>
            <a href="#">Профиль</a>
        </div>
    </div>
</nav>

<main>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</main>

<footer>
    <p>© 2026 Cinema</p>
</footer>

{% block js %}
{% endblock %}

</body>
</html>
